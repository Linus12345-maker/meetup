<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details - Meetdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coral: '#e8614a',
                        bgWarm: '#fafaf8',
                        textDark: '#2d2f2e',
                        textMuted: '#5a5c5b',
                        borderLight: '#f0f1ef'
                    },
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-bgWarm text-textDark font-sans min-h-screen flex flex-col antialiased">
    <main class="flex-grow w-full max-w-[430px] mx-auto pb-24" id="event-container">
        <!-- Skeleton Loading -->
        <div class="animate-pulse px-6 py-10 w-full">
            <div class="h-6 w-16 bg-gray-200 rounded mb-6"></div>
            <div class="h-[382px] w-full bg-gray-200 rounded-[32px] mb-6"></div>
            <div class="h-10 bg-gray-200 rounded w-3/4 mb-6"></div>
            <div class="h-12 bg-gray-200 rounded w-full mb-6"></div>
            <div class="h-12 bg-gray-200 rounded w-full mb-6"></div>
        </div>
    </main>

    <!-- Scripts -->

    <script src="/js/app.js"></script>
    <script src="/js/event.js"></script>
</body>
</html>
