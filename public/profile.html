<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Meetdown</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { coral: '#E8614A', amber: '#F59E0B', bgWarm: '#FAFAF8', slateDark: '#1E293B', slateMuted: '#64748B' }, fontFamily: { sans: ['DM Sans', 'sans-serif'], display: ['Plus Jakarta Sans', 'sans-serif'] }, borderRadius: { '2xl': '16px' } } } }
    </script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-bgWarm text-slateDark font-sans min-h-screen flex flex-col antialiased">
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 font-display font-bold text-xl tracking-tight">
                <div class="bg-coral text-white p-2 rounded-xl"><i class="ph ph-users-three"></i></div> Meetdown
            </a>
            <div id="auth-container" class="flex items-center gap-4"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto w-full px-6 py-12" id="profile-container">
        <!-- Loader -->
        <div class="text-center py-20 text-slateMuted">Loading profile...</div>
    </main>

    <script src="/js/app.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
